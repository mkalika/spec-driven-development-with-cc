ass=&quot;scar-takeaway&quot;&gt;Minimal fix → verify → then discuss scope. Bound it before the model does.&lt;/div&gt;\"><div class=\"num\">01<\u002Fdiv><div><div class=\"text\">Fix the faucet, not the kitchen.<\u002Fdiv><div class=\"gloss\">Minimal fix. Verify. Then expand.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;Same AI, same model, same week.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;A vague brief produces a polished output of the wrong thing. A sharp, measurable brief produces the right thing.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;Same AI. Different specs. Different products. Your spec is the ceiling.&lt;/div&gt;\"><div class=\"num\">07<\u002Fdiv><div><div class=\"text\">Specs are the ceiling.<\u002Fdiv><div class=\"gloss\">AI output quality scales with input spec quality.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;&amp;quot;Tests pass. Build succeeds.&amp;quot; That tells you the code is well-formed.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;It tells you nothing about whether the screen, the report, or the user-facing output is correct.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;Demonstrate correctness in the output medium that matters, not in the build log.&lt;/div&gt;\"><div class=\"num\">02<\u002Fdiv><div><div class=\"text\">\"It compiles\" proves nothing.<\u002Fdiv><div class=\"gloss\">Demonstrate correctness in the output medium.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;Mocks return the shape your code expects.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;The real API returns a slightly different shape at scale, and the first production call crashes.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;One live call before declaring done. Mocks always succeed.&lt;/div&gt;\"><div class=\"num\">08<\u002Fdiv><div><div class=\"text\">Real-data smoke gate.<\u002Fdiv><div class=\"gloss\">Mocks always succeed. One live call before \"done.\"<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;Bug surfaces. The AI offers three paragraphs of theory about why it might happen.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;A 30-second trace through real values would find the actual cause in one step.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;Make the AI compute, not narrate.&lt;/div&gt;\"><div class=\"num\">03<\u002Fdiv><div><div class=\"text\">Traces before theories.<\u002Fdiv><div class=\"gloss\">Real values through real code, or it's a guess.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;Logic works in test fixtures.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;Same logic, real production data (2,200 records instead of 50), runs an order of magnitude slower or breaks.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;What works at 50 doesn&amp;#x27;t automatically work at 2,200. Scale is its own concern.&lt;/div&gt;\"><div class=\"num\">09<\u002Fdiv><div><div class=\"text\">Scale ≠ logic.<\u002Fdiv><div class=\"gloss\">A rule sensible at 50 records can break at 2,200.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;Build the whole feature top-down: UI, state, persistence, the integration.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;Discover the foundational assumption (the protocol, the rate limit, the scaling model) doesn&amp;#x27;t hold.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;Prove the riskiest 20 lines first. Then build around them.&lt;/div&gt;\"><div class=\"num\">04<\u002Fdiv><div><div class=\"text\">Prototype the scary part first.<\u002Fdiv><div class=\"gloss\">Riskiest assumption · smallest experiment.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;In a code review or retro, the root cause gets named in writing.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;No ticket is created. No &amp;quot;won&amp;#x27;t-fix&amp;quot; is documented. The cause sits in the comment forever, unowned.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;If you wrote down the root cause, you owe a story or an explicit won&amp;#x27;t-fix.&lt;/div&gt;\"><div class=\"num\">10<\u002Fdiv><div><div class=\"text\">Named cause → story or won't-do.<\u002Fdiv><div class=\"gloss\">Naming a defect ≠ owning a fix.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;Every function passes its unit test.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;End-to-end, something between the functions silently drops state, and the user sees a broken flow.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;Test the workflow. Bugs hide in handoffs, not inside any single function.&lt;/div&gt;\"><div class=\"num\">05<\u002Fdiv><div><div class=\"text\">Test the workflow, not the function.<\u002Fdiv><div class=\"gloss\">Bugs hide in state between A → B → C.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;Old habit: &amp;quot;we&amp;#x27;ll fix that next sprint.&amp;quot;&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;A bounded one-hour fix turns into planning, scheduling, backlog grooming — and then re-appears as a real problem.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;The effort excuse is gone. Describe it in a sentence → fix it now.&lt;/div&gt;\"><div class=\"num\">11<\u002Fdiv><div><div class=\"text\">Stop deferring well-scoped fixes.<\u002Fdiv><div class=\"gloss\">Claude Code removed the effort excuse.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;A code comment says: &amp;quot;intentional — don&amp;#x27;t change.&amp;quot;&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;The AI &amp;quot;improves&amp;quot; it anyway. The thing the comment was protecting breaks downstream.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;Comments are warnings someone earned. Treat them as decisions, not noise.&lt;/div&gt;\"><div class=\"num\">06<\u002Fdiv><div><div class=\"text\">Code comments are decisions.<\u002Fdiv><div class=\"gloss\">Don't let AI \"fix\" intentional deviations.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"rule\" data-scar=\"&lt;div class=&quot;scar-setup&quot;&gt;A rule that made sense at week 1 starts costing more than it saves at week 6.&lt;/div&gt;&lt;div class=&quot;scar-punch&quot;&gt;Working with a new dependency, a new framework, a new constraint changes what &amp;quot;good&amp;quot; looks like.&lt;/div&gt;&lt;div class=&quot;scar-takeaway&quot;&gt;Refine your CLAUDE.md as you learn. Edit rules, don&amp;#x27;t carve them.&lt;/div&gt;\"><div class=\"num\">12<\u002Fdiv><div><div class=\"text\">Rules evolve, not ossify.<\u002Fdiv><div class=\"gloss\">Refine, don't replace. Layer 3 feeds Layer 1.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- SLIDE 19 · closing-questions -->\n    <article class=\"slide\" data-id=\"closing-questions\">\n      <h2 style=\"text-align: center; font-size: clamp(26px, 3vw, 38px); line-height: 1.35; max-width: 1200px; margin: 0 auto;\">\"Your job isn't to write the code. It's to <span style=\"background: var(--grad-accent); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800;\">see clearly<\u002Fspan> — and to make sure the AI can't get away with not seeing clearly either.\"<\u002Fh2>\n      <p class=\"muted center\" style=\"font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-top: 16px;\">— THE CALLBACK<\u002Fp>\n\n      <div class=\"slide-cols-2\" style=\"margin-top: 28px;\">\n        <div class=\"card cyan\">\n          <div class=\"eyebrow\" style=\"color: var(--intuit-cyan);\">QUESTIONS?<\u002Fdiv>\n          <p style=\"margin-top: 10px;\">Open floor. Anything from the talk — the failures, the discipline, the rules, your own projects.<\u002Fp>\n          <p class=\"muted sm\">I'll share this deck. The cheat sheet, the starter files, and the longer notes are all in it.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card green\">\n          <div class=\"eyebrow\" style=\"color: var(--intuit-green);\">THE ONE-WEEK CHALLENGE<\u002Fdiv>\n          <p style=\"margin-top: 10px;\">Pick one Claude Code session this week. Before you start, <strong>write down what \"done\" looks like<\u002Fstrong> — something the AI can be measurably wrong against.<\u002Fp>\n          <p class=\"sm\" style=\"margin-top: 8px;\">At the end, audit: did the AI get away with anything you didn't catch? If yes, write the rule that would have caught it. Put it in your <code>CLAUDE.md<\u002Fcode>.<\u002Fp>\n          <p class=\"sm\" style=\"margin-top: 10px;\"><strong class=\"green\">Start with one rule. Add the next one when the next bug teaches you.<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n  \n\n  <\u002Fdiv>\n  <div class=\"slide-controls\">\n    <button id=\"prev-btn\">← Previous<\u002Fbutton>\n    <div class=\"indicator\"><strong id=\"cur\">1<\u002Fstrong> / <span id=\"tot\">35<\u002Fspan> · <span id=\"slide-title\">cover<\u002Fspan><\u002Fdiv>\n    <button id=\"next-btn\">Next →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     OVERVIEW MODE — thumbs\n     ============================================================ -->\n<section id=\"view-overview\" class=\"view\" hidden=\"\">\n  <div class=\"grid\" id=\"thumb-grid\"><!-- populated by JS --><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- ============================================================\n     TOOLS MODE — starter pack\n     ============================================================ -->\n<section id=\"view-tools\" class=\"view\" hidden=\"\">\n  <div class=\"container\">\n    <div class=\"eyebrow\" style=\"color: var(--intuit-blue);\">THE STARTER PACK<\u002Fdiv>\n    <h1 style=\"color: var(--intuit-navy);\">The Starter Pack<\u002Fh1>\n    <p>The three files that implement the three-layer defense system, plus templates for the pipeline, hooks, and stories.<\u002Fp>\n\n    <div class=\"tool-card\">\n      <h2>1 · CLAUDE.md (Layer 1 · The Bouncer)<\u002Fh2>\n      <p>Lives at the repo root. Loaded into every Claude Code session. Shared with the team via git.<\u002Fp>\n      <button class=\"copy-btn\" data-target=\"copy-claude\">📋 Copy<\u002Fbutton>\n      <pre class=\"file-block\" id=\"copy-claude\"># CLAUDE.md\n\nThis file provides guidance to Claude Code when working with code in this repository.\n\n## Project Overview\n[Replace with your project description.]\n\n## Development Commands\n```bash\nnpm install\nnpm run dev\nnpm run build\nnpm test\n```\n\n## Architecture\n- Strict TypeScript — no `any`, no `@ts-ignore`, no `as any` casts\n- Named exports only — no default exports\n- [Your architecture invariants here]\n\n## Testing\n- Mocks always succeed with perfect data — never declare a feature done from mocks alone\n- Real-data smoke test gate: at least one live API call per method before \"done\"\n- Green test suite is a prerequisite for starting new work\n\n## AI / LLM Integration\n- Claude CLI may exit with non-zero codes while producing valid JSON — check stdout first\n- All JSON schema fields optional except container arrays\n- Treat all LLM output as untrusted input — validate\n\n## Process\n- Recurring review findings → promote to this file immediately\n- Speculative thresholds → data spike before locking\n- Named root cause → story or explicit won't-do\n- Stop deferring well-scoped fixes\n\n## Mandatory Protocols\n\n### Bug Diagnosis Protocol (MANDATORY)\nWhen a user reports unexpected behavior, run the 5-step protocol BEFORE offering any theory:\n1. What did the user actually do? (button/sequence)\n2. What handler runs? Find it in code.\n3. What state changes? Compute actual values.\n4. What does the new state produce visually?\n5. Does step 4 match what should happen?\nSkipping this protocol is a hard failure.\n\n### Visual Change Protocol (MANDATORY)\nWhen editing any visual/rendering code:\n1. BEFORE: take a baseline screenshot.\n2. Make the code change.\n3. AFTER: take another screenshot of the same view.\n4. Compare and describe specific elements.\n5. Test at multiple states (3+ different configs).\nSkipping this protocol is a hard failure.\n\n### Verify Before Declaring (MANDATORY)\nBefore stating something \"works,\" provide specific, falsifiable evidence:\n- Visual: \"element A at X,Y, element B 15px below — they don't overlap.\"\n- Computed: \"expected 108, got 108.\"\n- Behavior: state expectation BEFORE observing, then compare.\nSkipping this protocol is a hard failure.\n\n### Test Plan Execution (MANDATORY)\nWriting a test plan is not credit. If you write tests marked CRITICAL,\nyou must execute them — numerically, visually, or both — and report\nthe results before marking work complete.\n\n### Prototype Hard Visuals First (MANDATORY)\nWhen building visually complex components, identify the hardest rendering\nchallenge and build a minimal standalone prototype that proves the\napproach works BEFORE building the full system.\n\n## Known Bug Patterns\n(Auto-appended by /postmortem when new bug classes are found)<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"tool-card\">\n      <h2>2 · bug-postmortem/SKILL.md (Layer 2 · The Security Camera)<\u002Fh2>\n      <p>Drop at <code>.claude/skills/bug-postmortem/SKILL.md<\u002Fcode>. Claude Code auto-loads it on any debugging context.<\u002Fp>\n      <button class=\"copy-btn\" data-target=\"copy-skill\">📋 Copy<\u002Fbutton>\n      <pre class=\"file-block\" id=\"copy-skill\">---\nname: bug-postmortem\ndescription: &gt;\n  Automatic structured post-mortem when fixing bugs, errors, test failures,\n  crashes, regressions, or unexpected behavior. Triggers on any diagnosis,\n  debugging, error investigation, or fix implementation.\n---\n\n# Bug Post-Mortem Protocol\n\nYou are performing a structured post-mortem analysis. Follow ALL steps below\nrigorously. Do NOT skip any step. Do NOT mark the task complete until Phase 5\nis verified.\n\n## Phase 1: Root Cause Analysis (5 Whys + Causal Chain)\n\nMap the complete failure chain:\n\n  Trigger → [what initiated the failure]\n     ↓\n  Propagation → [how it moved through the system]\n     ↓\n  Manifestation → [what the user/system observed]\n     ↓\n  Root Cause → [the deepest systemic reason this was possible]\n\nApply iterative \"Why?\" analysis (minimum 3 levels, target 5).\nStop when you reach a cause you can ACT on.\n\nClassify the bug type:\n- Logic error · State management · Contract violation · Boundary failure\n- Configuration · Resource · Dependency · Data · UI/UX · Platform\n\n## Phase 2: Detection Gap Analysis\n\nFor EACH detection layer, explicitly state whether it SHOULD have caught\nthis and WHY it didn't:\n\n  | Layer                           | Should catch? | Why missed |\n  |---------------------------------|---------------|------------|\n  | Type system / compiler          |               |            |\n  | Linting / static analysis       |               |            |\n  | Unit tests                      |               |            |\n  | Integration tests               |               |            |\n  | E2E / visual / contract tests   |               |            |\n  | Code review                     |               |            |\n  | Build / CI pipeline             |               |            |\n  | Runtime error tracking          |               |            |\n\nIdentify the EARLIEST possible detection point. That's where prevention goes.\n\nCommon detection gap patterns:\n- Tests used mocks that masked real behavior\n- Happy-path-only testing — no negative/boundary cases\n- Test environment differs from real usage\n- Assertion checked the wrong thing\n- No test existed for this code path\n- Code review missed it because the bug is subtle\n- Error was silently swallowed\n- The bug only manifests with specific data/timing/sequence\n- Build/bundle difference from dev environment masked the behavior\n\n## Phase 3: Contradiction Analysis\n\nDoes fixing this bug risk degrading another quality (performance,\nreadability, bundle size, UX)? Seek a resolution that improves both\nsides rather than accepting a tradeoff.\n\nExamples:\n- Validation hurts performance → use compile-time validation\n- Tests increase maintenance → generate tests from a schema\n- Guard clutters the code → extract an abstraction\n\n## Phase 4: Preventive Implementation (MANDATORY — NOT OPTIONAL)\n\nImplement ALL applicable items. Check each as complete:\n\n### 4a. Regression Test (ALWAYS required)\n- Reproduces the EXACT original bug scenario.\n- Verify it FAILS without your fix (revert temporarily).\n- Verify it PASSES with your fix.\n\n### 4b. Boundary &amp; Edge Case Tests (ALWAYS required)\n- Identify at least 2 adjacent failure modes.\n- Write tests for those adjacent cases.\n\n### 4c. Type / Contract Hardening (when applicable)\n- Tighten types (strict mode, branded types, discriminated unions).\n- Add runtime validation at boundaries.\n\n### 4d. Static Analysis Rules (when applicable)\n- If the bug follows a detectable pattern, add a lint rule.\n\n### 4e. Defensive Guards (when applicable)\n- Add fail-fast assertions for \"impossible\" states.\n\n### 4f. Observability (when applicable)\n- Add structured log/error tracking at the failure point.\n\n### 4g. Documentation (CRITICAL — feeds Layer 1)\n- Add inline comment at fix site: `// FIX: [context] — [what went wrong]`\n- If this is a new bug pattern for this project, append to\n  \"Known Bug Patterns\" in CLAUDE.md:\n\n  - **[Pattern name]**: [Description]. Prevention: [what catches it].\n    First seen: [date/context].\n\n## Phase 5: Verification Checklist\n\nBefore declaring the fix complete, verify ALL:\n- [ ] Regression test fails without the fix (confirmed by running it)\n- [ ] Regression test passes with the fix (confirmed by running it)\n- [ ] All new edge case tests pass\n- [ ] Full test suite passes (no regressions introduced)\n- [ ] Fix addresses root cause, not just symptom\n- [ ] At least one preventive measure from Phase 4 has been implemented\n- [ ] The project still builds/bundles/deploys cleanly\n\n## Output Format\n\nAfter completing all phases, provide a structured summary:\n\n  **Bug**: [one-line description]\n  **Root Cause**: [the actionable root cause from Phase 1]\n  **Bug Type**: [classification from Phase 1]\n  **Earliest Detection Point**: [from Phase 2]\n  **Detection Gap**: [why the earliest detection point missed it]\n  **Preventive Actions Implemented**: [list with file:line references]\n  **Contradictions Resolved**: [if any, from Phase 3]\n  **Remaining Risk**: [any residual risk]<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"tool-card\">\n      <h2>3 · /postmortem command (Layer 3 · The Detective)<\u002Fh2>\n      <p>Drop at <code>.claude/commands/postmortem.md<\u002Fcode>. Invoked as <code>/postmortem<\u002Fcode> or <code>/postmortem $ARGUMENTS<\u002Fcode>.<\u002Fp>\n      <button class=\"copy-btn\" data-target=\"copy-cmd\">📋 Copy<\u002Fbutton>\n      <pre class=\"file-block\" id=\"copy-cmd\">Perform a comprehensive bug post-mortem on the issue just addressed\n(or the issue specified in $ARGUMENTS).\n\nFollow the bug-postmortem skill if available. Otherwise, execute this\ncomplete protocol:\n\n## Step 1: Identify the Bug\nIf $ARGUMENTS is provided, focus on that specific bug/file/component.\nIf no arguments, analyze the most recent bug fix in this session.\n\nClearly state:\n- What was the symptom?\n- What was the actual root cause?\n- When was the vulnerability likely introduced? (check git blame)\n\n## Step 2: Causal Chain\nMap the full path from trigger to manifestation:\n\n  Trigger → Propagation → Manifestation → Root Cause\n\nApply \"Why?\" analysis at least 3 levels deep.\nClassify the bug: logic/state/contract/boundary/config/resource/\ndependency/data/UI/platform.\n\n## Step 3: Detection Gap Audit\nFor each applicable layer (types, lint, unit tests, integration tests,\ne2e, code review, CI/build, runtime tracking):\n- SHOULD this layer have caught it? Yes/No\n- If yes, WHY did it miss?\nIdentify the earliest possible detection point.\n\n## Step 4: Contradiction Check\nDoes the fix degrade something else? Seek resolution, not tradeoff.\n\n## Step 5: Implement Prevention (MANDATORY)\nDo ALL of the following that apply — actually implement them:\n\n1. **Regression test** — fails without fix, passes with\n2. **Edge case tests** — at least 2 related boundaries\n3. **Type/contract hardening** — tighten types, validate at boundaries\n4. **Static analysis** — lint rule if pattern is detectable\n5. **Defensive guards** — fail-fast assertions for \"impossible\" states\n6. **Observability** — error logging that would surface this failure class\n7. **Documentation** — inline comment + update Known Bug Patterns in CLAUDE.md\n\n## Step 6: Verify\n- Run regression test WITHOUT the fix to confirm it catches the bug\n- Run regression test WITH the fix to confirm it passes\n- Run full test suite to confirm no regressions\n- Confirm the project builds/bundles cleanly\n- Report results\n\n## Step 7: Summary\nOutput a structured post-mortem summary:\n\n  **Bug**: [one-line]\n  **Root Cause**: [actionable cause]\n  **Bug Type**: [classification]\n  **Earliest Detection Point**: [which layer]\n  **Detection Gap**: [why it missed]\n  **Prevention Implemented**: [list with file references]\n  **Contradictions Resolved**: [if any]\n  **Remaining Risk**: [if any]<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"tool-card\">\n      <h2>4 · /sprint-pipeline orchestrator<\u002Fh2>\n      <p>Drop at <code>.claude/commands/sprint-pipeline.md<\u002Fcode>. The generic orchestrator that runs the create-story → dev → review → e2e → manual-gate pipeline per story. Stack-agnostic, project-agnostic — all project-specific knobs come from <code>.sprint-pipeline.config.md<\u002Fcode> below.<\u002Fp>\n      <button class=\"copy-btn\" data-target=\"copy-pipeline-cmd\">📋 Copy<\u002Fbutton>\n      <pre class=\"file-block\" id=\"copy-pipeline-cmd\">---\ndescription: Generic sprint pipeline orchestrator — runs create-story → dev → review → e2e per story, then visual e2e once at sequence end. Reads project config from .sprint-pipeline.config.md.\nargument-hint: &lt;story-num&gt;[,&lt;story-num&gt;...] [--auto] [--dry-run]\n---\n\n# Sprint Pipeline Orchestrator (generic)\n\nYou are the **Sprint Pipeline Orchestrator**. You run sprint stories through a multi-phase pipeline: create-story → dev → review → e2e → optional visual e2e → optional manual gates.\n\nYou are **stack-agnostic, project-agnostic, and skill-agnostic**. All project-specific knobs come from the project's `.sprint-pipeline.config.md` file. You contain only orchestration logic.\n\n**Stay thin.** Spawn subagents per phase. Read summaries, not code. Filesystem is the handoff bus.\n\n---\n\n## 0. Locate Project Config\n\nSearch for `.sprint-pipeline.config.md` starting at the current working directory, walking parent directories until found or filesystem root.\n\nIf not found:\n\n```\n🚫 No .sprint-pipeline.config.md found in this project.\n\nThis pipeline requires a project config file. To scaffold one:\n  - Run: /sprint-pipeline-init\n  - Or copy and edit a template from\n    https://github.com/&lt;your-distribution-repo&gt;/sprint-pipeline-template\n\nRequired config sections:\n  - Paths (sprint_status, deferred_work, planning_artifacts, implementation_artifacts)\n  - Skills (create_story, dev_story, code_review)\n  - Commands (unit_tests, e2e_tests; build_command if any hard-stop stories use it)\n  - Commit Format (pattern, patches_commit, decisions_commit)\n  - Visual E2E (enabled flag and, if enabled, method/command/port)\n  - Per-Epic Architecture Files (allowlist per epic)\n  - Prior-Story Loading Rule\n  - Per-Story Hard Stops, Dev Skill, E2E Command (as needed)\n  - Per-Epic Phase E Invariants (if visual e2e enabled)\n  - Phase E Invariant Scripts (implementations)\n```\n\nHALT.\n\nIf found, parse all sections into working memory. Validate required sections are present. If missing required sections, list them and HALT.\n\n---\n\n## 1. Argument Parsing\n\nArgs: `$ARGUMENTS`\n\nParse into:\n- `story_ids[]` — comma-separated story numbers (e.g., `12.7,12.8` → `[\"12.7\",\"12.8\"]`). Bare forms like `12-7` accepted.\n- `auto` — `true` if `--auto` flag present\n- `dry_run` — `true` if `--dry-run` flag present\n- `skip_visual` — `true` if `--skip-visual` flag present (also accepts `--no-phase-e`). Skips Phase E entirely for this run, regardless of `Visual E2E.enabled` in config. Phase D (per-story e2e) still runs and is still the DoD gate. Use when sequence touches surfaces whose Phase E invariant bodies aren't authored yet, or when ad-hoc skipping visual smoke is appropriate.\n\nIf `story_ids` empty: print usage, HALT.\n\n---\n\n## 2. Pre-Flight\n\nRead `{{paths.sprint_status}}` once.\n\nFor each story_id:\n- Resolve full `story_key` from sprint-status (e.g., `12.7` → `12-7-state-manager-sqlite-integration`)\n- Validate: status is `backlog` (fresh start) OR `ready-for-dev`/`review` (resume)\n- Validate: story's epic is `in-progress` OR `backlog`. If `backlog`, the orchestrator will transition it to `in-progress` automatically — on a live run write the change to sprint-status before Phase A fires; on a dry-run surface it in the plan as \"would transition epic-N: backlog → in-progress\". Epic status of `done` or `cancelled` is a hard block.\n\nResolve per-story metadata from config:\n- `arch_files[]` — from per-epic architecture allowlist\n- `prior_story_files[]` — computed from sprint-status using the config's prior-story rule\n- `dev_skill` — config default OR per-story override (may be `skip`)\n- `e2e_command` — config default OR per-story override\n- `hard_stop_reason` — from per-story hard-stops section, may be empty\n\nResolve sequence-level metadata:\n- `phase_e_enabled` — config flag, AND-ed with `!skip_visual` (the CLI flag forces it off for this run)\n- `phase_e_invariants_union` — union of per-epic invariants for all epics touched\n- `phase_e_method` — from config (`chrome-devtools-mcp` / `playwright` / `skip`)\n\n**Concern classification (apply before surfacing anything as a pre-flight blocker):**\n\nBefore flagging any concern, ask: *would this block story 1's Phase A right now, or would it resolve naturally as the sequence advances?* Classify each as:\n- `blocks-at-start` — prevents the first story from running cleanly (missing config section, story_id not found in sprint-status, story already `done`, epic `done`/`cancelled`, missing architecture files, etc.). **These belong in the pre-flight halt list.**\n- `resolves-during-sequence` — would close naturally as later stories ship (e.g., Phase E invariant scripts for UI surfaces that don't exist yet, prior-story files that will be authored mid-sequence by earlier stories). **These do NOT belong in pre-flight.** Surface them inside the Phase E plan section as informational notes, not blockers. Unauthored Phase E scripts specifically are caught by the section 4a gate just before Phase E fires — the right moment, after the surfaces under test exist.\n\nThe whole point of running Phase E once at sequence end is that the surfaces it tests are built during the sequence — treating their absence today as a pre-flight blocker is a category error.\n\n**Print plan (always — even on live runs):**\n\n```\nSprint Pipeline Plan\n====================\nProject: {{detected from cwd or config.project_name}}\nStories: {{story_ids joined}}\nAuto-proceed: {{auto}}\nDry-run: {{dry_run}}\nSkip visual e2e: {{skip_visual}}  (Phase E will be {{\"skipped\" if skip_visual else \"run at sequence end\"}})\n\nSkills: create={{config.skills.create_story}}, dev={{config.skills.dev_story}}, review={{config.skills.code_review}}\nTest commands: unit={{config.commands.unit_tests}}, e2e={{config.commands.e2e_tests}}\n\n[per-story summary with phases A-D and any hard stop]\n\n[Phase E plan if enabled, with invariants]\n\n[Phase F manual gates queued]\n```\n\nIf `dry_run`: print resolved subagent prompts (Appendix A), HALT.\n\nIf not `auto`: ask \"Proceed? [y/n]\". Wait.\n\n---\n\n## 3. Per-Story Loop\n\n**Before the loop (live run only):** if pre-flight identified any epic in `backlog` that needs transitioning, write `epic-N: in-progress` to sprint-status now (with updated `last_updated`). One write per epic, before any subagent fires. Skip on `--dry-run` (the plan already surfaced the would-transition note).\n\nFor each `story_id` (sequential, not parallel):\n\n### Phase A — Create Story\n\nSpawn `general-purpose` subagent (fresh context):\n\n```\nPrompt:\n  Create story file for story_key: {{story_key}}.\n  Use the {{config.skills.create_story}} skill via the Skill tool.\n\n  CONTEXT OVERRIDES — do NOT rely on default discovery:\n\n  Architecture files (load only these, ignore others):\n    {{arch_files joined as absolute paths}}\n\n  Prior-story intelligence (load all of these):\n    {{prior_story_files joined as absolute paths}}\n\n  Pass story_key directly to the skill (skip auto-discover):\n    story_key = {{story_key}}\n\n  Output paths:\n    sprint_status: {{config.paths.sprint_status}}\n    implementation_artifacts: {{config.paths.implementation_artifacts}}\n\n  After the skill runs, validate the produced story file contains:\n    - \"## Acceptance Criteria\" section with ≥3 ACs\n    - \"## Technical Requirements\" section\n    - \"## Previous Story Intelligence\" section (if prior_story_files non-empty)\n    - Status line: \"ready-for-dev\"\n\n  Return JSON ONLY:\n    {\n      \"ok\": true|false,\n      \"story_file\": \"&lt;absolute path&gt;\",\n      \"validation_failures\": [&lt;strings&gt;],\n      \"summary\": \"&lt;one-line scope&gt;\"\n    }\n```\n\n**Gate:** `ok == true`. Else HALT, surface failures.\n\n**Update:** `{{config.paths.sprint_status}}`: `{{story_key}}: ready-for-dev`, `last_updated`.\n\n### Phase B — Dev\n\nIf `dev_skill == \"skip\"`: skip; story file stands as-is (design-only). Advance to Phase C.\n\nSpawn `general-purpose` subagent (fresh context — model inherits from the orchestrator session, do NOT pin a specific model):\n\n```\nPrompt:\n  Implement story_key: {{story_key}}\n  Story file: {{story_file}}\n\n  Use the {{dev_skill}} skill via the Skill tool.\n\n  Test command for unit gate: {{config.commands.unit_tests}}\n\n  After implementation:\n    1. Stage &amp; commit changes (do not push).\n    2. Capture commit SHA.\n    3. Run: {{config.commands.unit_tests}}; capture exit code + log.\n    4. Update story file Status to: \"review\"\n\n  Commit format: {{config.commit.pattern}}\n    where:\n      {story_id} = {{story_id}}\n      {title} = brief description from story file's title\n\n  Return JSON ONLY:\n    {\n      \"ok\": true|false,\n      \"commit_sha\": \"&lt;sha&gt;\",\n      \"files_changed\": [&lt;paths&gt;],\n      \"unit_test_exit_code\": &lt;int&gt;,\n      \"unit_test_log\": \"&lt;last 100 lines&gt;\",\n      \"story_file\": \"{{story_file}}\",\n      \"summary\": \"&lt;one-line&gt;\"\n    }\n```\n\n**Gate:** `ok &amp;&amp; unit_test_exit_code == 0`. Else HALT, surface log.\n\n**Update:** sprint-status: `{{story_key}}: review`.\n\n### Phase C — Code Review\n\nSpawn `general-purpose` subagent (**fresh context — model inherits from the orchestrator session, do NOT pin a specific model**).\n\n\"Fresh context\" here means a fresh LLM session with no carryover from Phase B's conversation. No git worktree isolation: the pipeline is sequential, Phase B has already committed, and patches the reviewer applies should land directly on the current branch (matching how patches are committed elsewhere in the project).\n\n```\nPrompt:\n  Conduct adversarial code review for story_key: {{story_key}}.\n  Commit under review: {{commit_sha}}\n  Story file: {{story_file}}\n  Files changed: {{files_changed}}\n\n  Use the {{config.skills.code_review}} skill via the Skill tool.\n\n  Categorize findings into three buckets:\n    - patches: small mechanical fixes — apply directly, re-run\n              {{config.commands.unit_tests}}, commit as\n              \"{{config.commit.patches_commit pattern with story_id}}\"\n    - decisions: trade-offs needing human judgment — DO NOT apply, surface\n    - deferred: acknowledged-but-punted — append to\n                {{config.paths.deferred_work}} under header\n                \"## Deferred from: code review of {{story_key}} ({{today}})\"\n\n  Patch loop:\n    apply patches → run unit tests → if green commit, if red HALT.\n\n  Return JSON ONLY:\n    {\n      \"ok\": true|false,\n      \"patches_applied\": &lt;int&gt;,\n      \"patches_commit_sha\": \"&lt;sha or null&gt;\",\n      \"test_exit_code_after_patches\": &lt;int or null&gt;,\n      \"decisions\": [\n        {\n          \"id\": &lt;int&gt;, \"file\": \"&lt;path&gt;\", \"line\": &lt;int&gt;, \"title\": \"&lt;short&gt;\",\n          \"framing\": \"&lt;reviewer's explanation&gt;\",\n          \"options\": [{\"key\":\"a\",\"label\":\"&lt;text&gt;\"},...],\n          \"recommendation\": \"&lt;key or null&gt;\"\n        }\n      ],\n      \"deferred_count\": &lt;int&gt;,\n      \"critical_findings\": [&lt;strings&gt;],\n      \"report_summary\": \"&lt;2-3 sentences&gt;\"\n    }\n```\n\n**Gates (in order):**\n\n1. `critical_findings.length == 0` — else HALT\n2. `patches_applied == 0 || test_exit_code_after_patches == 0` — else HALT\n3. `decisions.length == 0` — else **batched menu** to user:\n\n```\n🛑 Story {{story_id}} — {{N}} decisions need your call before Phase D.\n\n[1] {{file}}:{{line}} — {{title}}\n    Reviewer: \"{{framing}}\"\n    Options: (a) {{options[0].label}}\n             (b) {{options[1].label}}\n    Recommendation: ({{recommendation}})\n\n[2] ...\n\nReply: \"1b 2a 3-rec\" | \"all-rec\" | \"halt\"\n```\n\nApply user resolutions as a follow-up commit using `{{config.commit.decisions_commit}}` pattern. Run `{{config.commands.unit_tests}}`. If red, HALT.\n\n### Phase D — Story-Local E2E\n\nRun inline (Bash, main session):\n\n```\nBash: {{e2e_command resolved per story}}\n```\n\n**Gate:** exit 0. Else HALT.\n\n**Update:** sprint-status: `{{story_key}}: done`. Append a status comment matching the project's existing pattern (look at recent done stories for style — typically `# dev YYYY-MM-DD + review + N patches + M defers`).\n\n### Hard-Stop Check\n\nIf `hard_stop_reason` non-empty for this story, queue for Phase F.\n\n---\n\n## 4. Phase E — Sequence Visual E2E\n\nIf `skip_visual == true` (CLI `--skip-visual` / `--no-phase-e`): skip directly to Phase F. Note in the run log: \"Phase E skipped (--skip-visual)\".\n\nIf `phase_e_enabled == false`: skip directly to Phase F.\n\nIf `phase_e_method == \"skip\"`: skip.\n\nCompute `phase_e_invariants_union` from all epics touched by `story_ids`.\n\n### 4a. Unauthored-Script Gate (live run only)\n\nBefore spawning the Phase E subagent, scan the config's \"Phase E Invariant Scripts\" section. For each invariant in `phase_e_invariants_union`, locate its body (the content under its `### {invariant-name}` heading, up to the next `###` or `---`).\n\nClassify the body as **unauthored** if any of:\n- Body is empty / whitespace-only.\n- Body matches the regex `\\bTBD\\b` (case-insensitive).\n- Body matches the placeholder pattern `^\\s*\\(.*(TBD|to be implemented|to be authored|placeholder).*\\)\\s*$` (case-insensitive, single line).\n\nIf `unauthored.length &gt; 0`, HALT with:\n\n```\n🛑 Phase E blocked — {{N}} invariant script(s) not yet authored:\n\n  - {{name}}  (body: \"{{first 80 chars of body}}\")\n  - ...\n\nThese surfaces should now exist (built by stories in this sequence). Author\nthe script bodies in .sprint-pipeline.config.md under \"## Phase E Invariant\nScripts\", then re-run the pipeline with the same args to resume at Phase E.\n\nReference: see existing authored scripts in the same section (e.g.\nbriefing-renders, persistence-smoke) for the expected shape.\n```\n\nDo NOT auto-revert. Stories already shipped (Phase D `done`) stay `done`.\n\nThis gate is the structural complement to the pre-flight `resolves-during-sequence` classification: TBD entries are tolerated all the way until sequence-end, but **must** be filled before Phase E fires. If a project genuinely wants an invariant skipped (rather than authored), remove it from the per-epic invariants list in config — don't leave a TBD body.\n\n### 4b. Resolve artifacts dir &amp; spawn subagent\n\nResolve `phase_e_artifacts_dir = {{config.paths.implementation_artifacts}}/phase-e-{{seq_name}}/` where `seq_name` is story_ids joined by `-`, abbreviated to `{{first}}-thru-{{last}}` if more than 4.\n\nSpawn `general-purpose` subagent (fresh context):\n\n```\nPrompt:\n  Run Phase E sequence-end visual e2e.\n  Stories in sequence: {{story_ids}}\n  Method: {{phase_e_method}}\n  Invariants to test: {{phase_e_invariants_union}}\n\n  Setup (method-specific):\n\n  IF method == \"chrome-devtools-mcp\":\n    1. Bash (run_in_background: true): {{config.visual_e2e.command}}\n       (typically launches with --remote-debugging-port={{config.visual_e2e.cdp_port}})\n    2. Wait ~10 seconds for app ready.\n    3. Load chrome-devtools-mcp tools via ToolSearch:\n       \"mcp__plugin_chrome-devtools-mcp_chrome-devtools__*\"\n    4. list_pages → find the app window. select_page &lt;id&gt;.\n\n  IF method == \"playwright\":\n    1. Bash: {{config.visual_e2e.command}}\n       (typically a Playwright script that runs the catalog)\n    2. Parse output as JSON matrix.\n\n  Run ALL invariants — mode: complete-all (do NOT halt on first failure).\n  Per-invariant implementations are listed below as scripts; each yields\n  pass|fail and may capture screenshots.\n\n  Invariant scripts (project-specific, from project config):\n    {{config.phase_e.invariant_scripts — full block from config file}}\n\n  Save screenshots to: {{phase_e_artifacts_dir}}\n\n  Cleanup: kill any background process started in setup.\n\n  Return JSON ONLY:\n    {\n      \"ok\": &lt;true if all invariants passed&gt;,\n      \"matrix\": [\n        {\"invariant\": \"&lt;name&gt;\", \"result\": \"pass|fail\", \"detail\": \"&lt;...&gt;\"},\n        ...\n      ],\n      \"screenshots\": [&lt;paths&gt;],\n      \"console_warnings\": [&lt;strings&gt;]\n    }\n```\n\n**Gate:** `ok == true`. If false, surface matrix with details. Do NOT auto-revert.\n\n---\n\n## 5. Phase F — Manual Gates\n\nFor each queued `hard_stop_reason`:\n\n```\n🛑 Manual gate for Story {{story_id}}:\n   {{hard_stop_reason}}\n\n   When complete, reply \"{{story_id}} acknowledged\" or \"abort\".\n```\n\nWait for user. Once acknowledged, sequence COMPLETE.\n\n---\n\n## 6. Final Summary\n\n```\n✅ Sprint Pipeline Complete\n   Stories shipped: {{story_ids}}\n   Commits added: {{N}}\n   Phase E: {{pass/fail summary}}\n   Screenshots: {{phase_e_artifacts_dir}}\n   Deferred items: {{N}} → see {{config.paths.deferred_work}}\n```\n\n---\n\n## Failure / Resume Behavior\n\nIf pipeline halts mid-sequence:\n- Story state in sprint-status reflects last successful phase.\n- Restart with same args: pre-flight detects current state and resumes appropriately.\n\nIf user types \"abort\": HALT immediately. Do NOT auto-revert. Working tree stays for human inspection.\n\n---\n\n## Appendix A — Dry-Run Output\n\nWhen `--dry-run`, after the plan is printed, also print for each story the EXACT prompt each subagent would receive (with all placeholders resolved against the loaded config). Lets the user audit wiring before any subagent fires.\n\n---\n\n## Notes for Maintainers\n\n- **Add a new project**: write `.sprint-pipeline.config.md` at project root. No changes here.\n- **Add a new BMAD-style framework**: ensure that framework's create/dev/review skills accept the same context-override pattern; add an example config to the distribution.\n- **Add a new visual e2e method** (e.g., Cypress, Detox): extend the Phase E `IF method == \"...\"` block. Method names live in project configs.\n- **Change orchestration logic** (gate semantics, decision-menu format, etc.): change here once, all projects benefit.\n<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"tool-card\">\n      <h2>5 · .sprint-pipeline.config.md (real example)<\u002Fh2>\n      <p>This is the actual config from my project — 391 lines, complete and working. Drop at the repo root as <code>.sprint-pipeline.config.md<\u002Fcode>. Strip the project-specific paths (anything under <code>_bmad-output/<\u002Fcode>) and adapt the skill names and phase commands to your stack.<\u002Fp>\n      <button class=\"copy-btn\" data-target=\"copy-pipeline\">📋 Copy<\u002Fbutton>\n      <pre class=\"file-block\" id=\"copy-pipeline\"># Sprint Pipeline Project Config — ClearHelm\n\nRead by `/sprint-pipeline` (user-level slash command). Edit this file to change pipeline behavior — never edit the slash command.\n\nFormat: structured markdown. Section headers (## level) are required and parsed by name.\n\n---\n\n## Project Name\n\nClearHelm\n\n---\n\n## Paths\n\nAll paths are relative to the project root (the directory containing this file).\n\n```\nsprint_status: _bmad-output/implementation-artifacts/sprint-status.yaml\ndeferred_work: _bmad-output/implementation-artifacts/deferred-work.md\nplanning_artifacts: _bmad-output/planning-artifacts/\nimplementation_artifacts: _bmad-output/implementation-artifacts/\n```\n\n---\n\n## Skills\n\nBMAD skills used per phase. The orchestrator passes these to phase subagents which invoke them via the Skill tool.\n\n```\ncreate_story: bmad-create-story\ndev_story: bmad-dev-story\ncode_review: bmad-code-review\n```\n\nOverride per story via \"Per-Story Dev Skill Override\" section below.\n\n---\n\n## Commands\n\nProject npm scripts and shell commands invoked by the pipeline.\n\n```\nunit_tests: npm run test\ne2e_tests: npm run test &amp;&amp; npm run test:e2e:managed\nbuild_command: npm run build:mac\n```\n\n`unit_tests` is the gate command after Phase B (dev) and after applying review patches.\n\n`e2e_tests` is the default Phase D command. **Use `test:e2e:managed`, not `test:e2e`.** The managed runner (scripts/run-managed-e2e.mjs) owns the full Phase D lifecycle: launches `dev:debug`, waits for CDP, waits for sync to settle (~10 min on a populated Enterprise Grid dev DB), runs the e2e suite, then kills the process group. Calling `test:e2e` directly against an un-launched app reports \"87 skipped, exit 0\" because the playwright fixture (e2e/support/fixtures.ts:21) skips when CDP is unreachable — a silent skip-as-pass that the Phase D gate (\"exit 0 = pass\") cannot catch. The managed runner removes this foot-gun. Per-story override allowed below.\n\n`build_command` is referenced from per-story hard stops; not auto-invoked.\n\n---\n\n## Commit Format\n\nPatterns the dev/review subagents must use when committing. Placeholders:\n- `{story_id}` — e.g., `12.7`\n- `{title}` — short story title from the story file\n\n```\npattern: feat: Story {story_id} — {title}\npatches_commit: fix: Story {story_id} — review patches\ndecisions_commit: fix: Story {story_id} — review decisions resolved\n```\n\n---\n\n## Visual E2E\n\nPhase E configuration. Runs once at sequence end, after all stories' Phase D pass, before any Phase F manual gates.\n\n```\nenabled: true\nmethod: chrome-devtools-mcp\ncommand: npm run dev:debug\ncdp_port: 9333\n```\n\n`command` launches the app with CDP exposed on `cdp_port`. The Phase E subagent connects via `chrome-devtools-mcp` and runs the invariants listed below.\n\nTo disable Phase E entirely: set `enabled: false`.\n\n---\n\n## Per-Epic Architecture Files\n\nAllowlist per epic. Skill `bmad-create-story` would otherwise glob and load every architecture file in the planning artifacts folder, including stale versions. Paths are relative to `planning_artifacts/`.\n\n```\nepic-12: architecture/ClearHelm_Architecture_v3.md, architecture/SecondBrain_Architecture_v2.md\nepic-13: architecture/SecondBrain_Architecture_v2.md, architecture/ClearHelm_Architecture_v3.md\nepic-14: architecture/SecondBrain_Architecture_v2.md, ux-design-specification.md\nepic-15: architecture/SecondBrain_Architecture_v2.md, ux-design-specification.md\nepic-16: architecture/SecondBrain_Architecture_v2.md, ux-design-specification.md\nepic-17: architecture/SecondBrain_Architecture_v2.md\nepic-18: architecture/SecondBrain_Architecture_v2.md, architecture/ClearHelm_Architecture_v3.md\nepic-19: architecture/SecondBrain_Architecture_v2.md, architecture/ClearHelm_Architecture_v3.md\ndefault: architecture/ClearHelm_Architecture_v3.md\n```\n\nStale (do NOT auto-load): `architecture/ClearHelm_Architecture_v2.md`, `architecture/SecondBrain_Architecture_v1.md`, `architecture/adr-001-search-first-sync-strategy.md`.\n\n---\n\n## Prior-Story Loading Rule\n\nRule applied to all epics:\n\n&gt; Load ALL stories in the same epic with status `done`, in numerical order. Also load the LAST `done` story of the immediately-prior epic (if that epic is `in-progress` or recently completed). Discovery is dynamic — re-read sprint-status each pipeline run.\n\nStory files live in `implementation_artifacts/`. Filename pattern: `{epic}-{story}-{slug}.md`.\n\nExample for `12.7`: load `12-3-*`, `12-4-*`, `12-5-*`, `12-6-*` from `implementation_artifacts/`.\n\n---\n\n## Per-Story Hard Stops\n\nStories that cannot be marked fully done by automation — surface a Phase F manual instruction after Phase D.\n\n```\n12-8-migration-safety-and-rollback: build:mac DMG + manual install smoke on a fresh state (delete ~/.clearhelm/data/ first to test cold migration)\n12-9-socket-mode-design-spec-and-token-capture: design-only — no build, just review the design doc with Michael\n19-13-stale-channel-aggregate-scrub: run `npx tsx scripts/scrub-stale-source-threads.ts` (dry-run, default), review `~/.clearhelm/data/scrub-preview.json`, then re-run with `--confirm`. Confirm bogus chips disappear from briefing UI (compare to 2026-05-14 screenshots) before acknowledging.\n```\n\n(Add new entries as future stories require manual gates.)\n\n---\n\n## Per-Story Dev Skill Override\n\nDefault: use `Skills.dev_story` from above. Override when a story is purely design or a quick-flow.\n\n```\n12-9-socket-mode-design-spec-and-token-capture: skip\n```\n\n`skip` = do not run Phase B; the story's \"implementation\" is the design doc itself, written during Phase A. Phase C still runs (review the design doc). Phase D becomes a no-op. Phase E skipped for this story alone but runs at sequence end.\n\nOther valid values: any installed skill name (e.g., `bmad-quick-dev`).\n\n---\n\n## Per-Story E2E Command Override\n\nDefault: `Commands.e2e_tests` above.\n\n```\ndefault: npm run test &amp;&amp; npm run test:e2e:managed\n14-1-brain-view-shell-and-node-list: npm run test &amp;&amp; npm run test:e2e:managed -- --grep \"brain-view\"\n```\n\nFor a fully different runner (e.g., a chrome-devtools-mcp subagent instead of Bash), prefix with `subagent:` and provide a prompt. Example (not currently needed):\n\n```\n14-3-wiki-panel-node-detail: subagent: launch dev:debug, navigate to brain view, click first node, assert wiki panel renders\n```\n\n---\n\n## Per-Epic Phase E Invariants\n\nPhase E exercises the running app. Catalogs are **additive** — the union across epics touched by the sequence is the set tested.\n\n```\nepic-12:\n  - console-clean\n  - briefing-renders\n  - sections-populate\n  - persistence-smoke\n  - people-view-renders\n  - settings-shells-render\n\nepic-13:\n  - knowledge-chips-render-on-thread-cards\n  - chip-popover-opens\n  - brain-learned-banner-appears\n\nepic-14:\n  - brain-view-tab-renders\n  - node-list-renders\n  - brain-filter-pills-work\n  - wiki-panel-opens-on-click\n  - source-thread-labels-readable  # Story 14.4a (Phase D deferred 2026-05-13)\n\nepic-15:\n  - cmd-k-overlay-opens\n  - cmd-k-search-results-render\n  - cmd-k-result-navigation\n\nepic-16:\n  - constellation-graph-canvas-renders\n  - graph-focus-mode-toggles\n\nepic-17:\n  - contradiction-chips-render\n  - contradiction-resolution-panel-opens\n\nepic-18:\n  - custom-node-types-settings-render\n  - promote-from-thread-action-works\n\nepic-19:\n  - attribution-provenance-expandable  # Story 19.9 — first visual surface in Epic 19\n```\n\nImplementations for each invariant name are in the next section.\n\n---\n\n## Phase E Invariant Scripts\n\nImplementations referenced by the Phase E subagent. Each block describes what the subagent should do for the named invariant. Fail = the assertion failed; otherwise pass. Capture screenshots where indicated.\n\n### console-clean\n\n`mcp list_console_messages` → fail if any entry has `severity: 'error'`. Capture warnings (do not fail on warnings) for the report.\n\n### briefing-renders\n\n`mcp take_snapshot` → assert at least one element with role `'heading'` whose text matches a known section name (read configured sections via `evaluate_script` against state). Screenshot → `briefing.png`.\n\n### sections-populate\n\n`mcp evaluate_script`: count elements matching `[data-section-id]` (or current section selector). Assert ≥1 element per configured section.\n\n### persistence-smoke\n\nHighest-value invariant for SQLite stories.\n\n1. Click first thread card → click \"Mark done\".\n2. Bash: kill the Electron PID.\n3. Bash: relaunch via `Visual E2E.command`. Wait ~10s.\n4. Re-select page; navigate to Archive view.\n5. Assert the dismissed thread appears with \"done\" state.\n\nScreenshots: `persistence-before.png`, `persistence-after.png`.\n\n### people-view-renders\n\nClick \"People\" tab. `take_snapshot` → assert circle member cards render (≥1). Screenshot → `people.png`.\n\n### settings-shells-render\n\nOpen settings. For each subview (Sections, Channels, Plugins, Profile, Sync, Data Management): click the nav item, assert renders without error. One screenshot per subview: `settings-{name}.png`.\n\n### knowledge-chips-render-on-thread-cards\n\nStory 13.4 surface. Navigate to Briefing if not already (`mcp click` on the Briefing sidebar button). Then:\n\n1. `mcp evaluate_script`:\n   ```js\n   ({\n     railCount: document.querySelectorAll('[data-testid^=\"thread-chips-\"]').length,\n     chipCount: document.querySelectorAll('[data-testid=\"knowledge-chip\"]').length,\n     threadRowCount: document.querySelectorAll('[role=\"option\"]').length\n   })\n   ```\n2. Assertions:\n   - `railCount` ≥ 1 — at least one thread row has a chip rail container. Story 13.4 mounts the rail unconditionally below the action row; rail count of 0 across all threads means the rail container itself stopped rendering (regression).\n   - If `chipCount === 0` AND `threadRowCount &gt; 0`, soft-pass with detail `\"no extracted knowledge in dev DB yet — chip rendering machinery intact\"`. The dev DB may legitimately have zero nodes (fresh install, all dismissed, or extraction pipeline disabled).\n   - If `chipCount &gt; 0`, hard-pass with detail `\"${chipCount} chips across ${railCount} thread rails\"`.\n3. Screenshot → `chips-on-cards.png` (full briefing view).\n\n### chip-popover-opens\n\nStory 13.5 surface. Prerequisite: `chipCount &gt; 0` from the chips invariant. If chipCount was 0 there, skip with detail `\"no chips to click\"` (this invariant tests popover machinery; it requires at least one chip to exercise).\n\n1. `mcp evaluate_script` to find the first chip and capture its bounding box:\n   ```js\n   const chip = document.querySelector('[data-testid=\"knowledge-chip\"]')\n   if (!chip) throw new Error('no knowledge-chip element')\n   const r = chip.getBoundingClientRect()\n   ;({ x: Math.round(r.left + r.width / 2), y: Math.round(r.top + r.height / 2) })\n   ```\n2. `mcp click` at the returned coordinates (or `mcp click` directly on the testid selector if supported).\n3. `mcp wait_for` `[data-testid=\"chip-popover\"]` (≤ 2s).\n4. `mcp evaluate_script`:\n   ```js\n   ({\n     hasTypeBadge: !!document.querySelector('[data-testid=\"chip-popover-type-badge\"]'),\n     hasDismiss: !!document.querySelector('[data-testid=\"chip-popover-dismiss\"]'),\n     hasContent: !!document.querySelector('[data-testid=\"chip-popover-content\"]') ||\n                 !!document.querySelector('[data-testid=\"chip-popover-empty\"]'),\n     popoverInViewport: (() =&gt; {\n       const p = document.querySelector('[data-testid=\"chip-popover\"]')\n       const r = p?.getBoundingClientRect()\n       return r ? r.top &gt;= 0 &amp;&amp; r.left &gt;= 0 &amp;&amp; r.bottom &lt;= innerHeight &amp;&amp; r.right &lt;= innerWidth : false\n     })()\n   })\n   ```\n5. Assert all four are `true`. The popover must show type badge, dismiss button, content-or-empty state, and sit fully within viewport (clamp logic working).\n6. Press `Escape` (`mcp press_key`). Wait for `[data-testid=\"chip-popover\"]` to disappear (≤ 1s). Assert closed.\n7. Screenshot → `chip-popover-open.png` taken BEFORE the Escape press.\n\n### brain-learned-banner-appears\n\nStory 13.6 surface. Banner has a 5-gate suppression chain (loading, no data, 0 nodes, chipPresenceRatio &gt; 0.30, dismissed-today). At runtime the banner is often suppressed — assert DOM matches the expected gate decision rather than asserting \"banner is always present.\"\n\n1. `mcp evaluate_script`:\n   ```js\n   (async () =&gt; {\n     const data = await window.electronAPI.invoke?.('knowledge:getBrainLearnedToday')\n       ?? await window.electronAPI.getBrainLearnedToday?.()\n     return data ?? null\n   })()\n   ```\n   This returns `{ nodes: [], chipPresenceRatio: number } | null`.\n2. Compute expected visibility:\n   - `null` or `{ nodes: [] }` → expectedVisible = false (gate 2/3: no data or 0 nodes).\n   - `chipPresenceRatio &gt; 0.30` → expectedVisible = false (gate 4: retired).\n   - `localStorage['clearhelm.brainLearnedBanner.dismissedDate']` matches today's local date → expectedVisible = false (gate 5).\n   - Otherwise → expectedVisible = true.\n3. `mcp evaluate_script`:\n   ```js\n   ({\n     bannerPresent: !!document.querySelector('[data-testid=\"brain-learned-banner\"]'),\n     storedDismiss: localStorage.getItem('clearhelm.brainLearnedBanner.dismissedDate')\n   })\n   ```\n4. Assert `bannerPresent === expectedVisible`. If both false, soft-pass with detail naming the suppression gate. If both true, verify structural integrity (has at least one of: toggle button, dismiss button, list — query the three banner testids) and hard-pass.\n5. Screenshot → `brain-learned-banner.png` regardless of visibility (the page state is the artifact).\n\n### brain-view-tab-renders, node-list-renders, brain-filter-pills-work, wiki-panel-opens-on-click\n\n(epic-14 — TBD)\n\n### cmd-k-overlay-opens, cmd-k-search-results-render, cmd-k-result-navigation\n\n(epic-15 — TBD)\n\n### constellation-graph-canvas-renders, graph-focus-mode-toggles\n\n(epic-16 — TBD)\n\n### contradiction-chips-render, contradiction-resolution-panel-opens\n\n(epic-17 — TBD)\n\n### custom-node-types-settings-render, promote-from-thread-action-works\n\n(epic-18 — TBD)\n\n### attribution-provenance-expandable\n\nStory 19.9 — asserts the wiki panel's source-thread row expansion affordance reveals the provenance trail and remediation buttons when an attribution is drift-detected. Pre-seeded fixture required: one node with one source thread whose `attribution_provenance` row has `status='drift-detected'`.\n\n1. Navigate to Brain View. Click the seeded node. Wait for wiki panel to open.\n2. Locate the source thread row by `data-testid='source-thread-row'`. Inside its container, locate the chevron (`data-testid='source-thread-row-provenance-toggle'`). Click it.\n3. `mcp take_snapshot` → assert the expanded panel (`data-testid='provenance-trail-expanded'`) is now visible.\n4. Assert the panel contains the tier sentence (one of \"Matched because the thread and concept use nearly identical words.\" / \"Matched because the thread and concept express similar meaning.\" / \"Matched after AI judged the thread and concept describe the same thing.\" / \"Matched because the titles overlap and the same people appear in both.\" / \"Matched on a combined signal (older, less precise method).\" / \"Created before audit started.\").\n5. Assert two buttons are visible: `data-testid='provenance-action-correct'` (text \"Looks correct\") and `data-testid='provenance-action-stale'` (text \"Mark stale\").\n6. Assert NO percentage character (`%`) appears anywhere inside the panel at the DEFAULT rendering (anti-pattern #4 invariant).\n7. Click the \"Show details\" toggle (`data-testid='provenance-toggle-details'`). Assert the tier name (e.g., \"Cascade tier: semantic-clear\") becomes visible.\n8. Click the \"Show advanced\" toggle (`data-testid='provenance-toggle-advanced'`). Assert raw cosine appears in `X.XX` decimal format and STILL contains no raw `XX%` percentage rendering.\n9. Screenshot → `attribution-provenance-expandable.png`.\n\n---\n\n## Sequence Naming\n\nFor Phase E screenshot folders. Default: join story_ids with `-` (e.g., `12.7-12.8` → `phase-e-12.7-12.8/`). Sequences &gt;4 stories abbreviate to `phase-e-{first}-thru-{last}/`.\n\n---\n\n## Pre-Flight DB Check\n\nBefore Phase E, verify dev DB is populated. ClearHelm uses `~/.clearhelm-dev/data/`. If briefing renders empty, Phase E should halt with a \"dev DB empty — run a sync first\" message rather than pass-trivially on empty data.\n\n---\n\n## Subagent Contract (orchestrator → subagents)\n\nThe pipeline runs each phase in a fresh subagent context. To avoid step-on-step state corruption, the orchestrator MUST include these constraints in every Phase A/B/C subagent prompt:\n\n1. **Phase C reviewers MUST NOT modify `sprint_status.yaml` or the story's `Status:` line.** Status transitions belong to the orchestrator alone, which advances them only after the corresponding gate passes. A reviewer that flips a story to `done` before Phase D runs creates a false green. **Witnessed 2026-05-11**: the Phase C reviewer for Story 13.5 wrote `Status: done` to both the story file and sprint-status before Phase D ran. The orchestrator had to verify the gate manually. (Phase A `bmad-create-story` *does* legitimately update sprint-status — `backlog → ready-for-dev` — and Phase B `bmad-dev-story` legitimately advances `ready-for-dev → review` after the unit gate. Only Phase C is constrained.)\n\n2. **Do NOT touch other stories' files.** A Phase B/C subagent for story X may read prior-story files but may not edit them. Cross-story edits indicate the subagent has lost scope.\n\n3. **Return JSON only.** Subagents that emit prose around their JSON force the orchestrator to parse loose markdown.\n\n4. **Patch loop is bounded by `unit_tests`.** Apply patches → run unit tests → if green commit, if red HALT. Subagents that loop on red (re-trying patches against failing tests) should HALT and return `ok: false` with the test log.\n\nThese constraints are the orchestrator's responsibility to surface in every prompt — they are not enforceable from the config file alone. If a subagent violates one, log the violation and treat its output as suspect.\n<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"tool-card\">\n      <h2>6 · The Second-Brain Hooks (Python · production source)<\u002Fh2>\n      <p>The real three-hook system that powers the second brain — registered via <code>.claude/settings.json<\u002Fcode>, implemented as three Python scripts. Together they: load yesterday's knowledge into context at session start (SessionStart), capture state before auto-compaction (PreCompact), and flush today's insights into a dated daily log + update the knowledge index at session end (SessionEnd).<\u002Fp>\n      <p class=\"muted sm\" style=\"margin-top: 4px;\">Requires <code>uv<\u002Fcode> for Python execution. Total: ~430 lines across 3 files + settings.json.<\u002Fp>\n      <button class=\"copy-btn\" data-target=\"copy-hooks\">📋 Copy all 4 files<\u002Fbutton>\n      <pre class=\"file-block\" id=\"copy-hooks\"># === .claude/settings.json (project-level hook registration) ===\n\n{\n  \"hooks\": {\n    \"SessionStart\": [\n      {\n        \"matcher\": \"\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"uv run python hooks/session-start.py\",\n            \"timeout\": 15\n          }\n        ]\n      }\n    ],\n    \"PreCompact\": [\n      {\n        \"matcher\": \"\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"uv run python hooks/pre-compact.py\",\n            \"timeout\": 10\n          }\n        ]\n      }\n    ],\n    \"SessionEnd\": [\n      {\n        \"matcher\": \"\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"uv run python hooks/session-end.py\",\n            \"timeout\": 20\n          }\n        ]\n      }\n    ]\n  }\n}\n\n\n# === hooks/session-start.py ===\n# Runs at the start of every Claude Code session.\n# Injects the knowledge-base index and the latest daily log into context.\n\n\"\"\"\nSessionStart hook - injects knowledge base context into every conversation.\n\nThis is the \"context injection\" layer. When Claude Code starts a session,\nthis hook reads the knowledge base index and recent daily log, then injects\nthem as additional context so Claude always \"remembers\" what it has learned.\n\nConfigure in .claude/settings.json:\n{\n    \"hooks\": {\n        \"SessionStart\": [{\n            \"matcher\": \"\",\n            \"command\": \"uv run python hooks/session-start.py\"\n        }]\n    }\n}\n\"\"\"\n\nimport json\nimport sys\nfrom datetime import datetime, timedelta, timezone\nfrom pathlib import Path\n\n# Paths relative to project root\nROOT = Path(__file__).resolve().parent.parent\nKNOWLEDGE_DIR = ROOT / \"knowledge\"\nDAILY_DIR = ROOT / \"daily\"\nINDEX_FILE = KNOWLEDGE_DIR / \"index.md\"\n\nMAX_CONTEXT_CHARS = 20_000\nMAX_LOG_LINES = 30\n\n\ndef get_recent_log() -&gt; str:\n    \"\"\"Read the most recent daily log (today or yesterday).\"\"\"\n    today = datetime.now(timezone.utc).astimezone()\n\n    for offset in range(2):\n        date = today - timedelta(days=offset)\n        log_path = DAILY_DIR / f\"{date.strftime('%Y-%m-%d')}.md\"\n        if log_path.exists():\n            lines = log_path.read_text(encoding=\"utf-8\").splitlines()\n            # Return last N lines to keep context small\n            recent = lines[-MAX_LOG_LINES:] if len(lines) &gt; MAX_LOG_LINES else lines\n            return \"\\n\".join(recent)\n\n    return \"(no recent daily log)\"\n\n\ndef build_context() -&gt; str:\n    \"\"\"Assemble the context to inject into the conversation.\"\"\"\n    parts = []\n\n    # Today's date\n    today = datetime.now(timezone.utc).astimezone()\n    parts.append(f\"## Today\\n{today.strftime('%A, %B %d, %Y')}\")\n\n    # Knowledge base index (the core retrieval mechanism)\n    if INDEX_FILE.exists():\n        index_content = INDEX_FILE.read_text(encoding=\"utf-8\")\n        parts.append(f\"## Knowledge Base Index\\n\\n{index_content}\")\n    else:\n        parts.append(\"## Knowledge Base Index\\n\\n(empty - no articles compiled yet)\")\n\n    # Recent daily log\n    recent_log = get_recent_log()\n    parts.append(f\"## Recent Daily Log\\n\\n{recent_log}\")\n\n    context = \"\\n\\n---\\n\\n\".join(parts)\n\n    # Truncate if too long\n    if len(context) &gt; MAX_CONTEXT_CHARS:\n        context = context[:MAX_CONTEXT_CHARS] + \"\\n\\n...(truncated)\"\n\n    return context\n\n\ndef main():\n    context = build_context()\n\n    output = {\n        \"hookSpecificOutput\": {\n            \"hookEventName\": \"SessionStart\",\n            \"additionalContext\": context,\n        }\n    }\n\n    print(json.dumps(output))\n\n\nif __name__ == \"__main__\":\n    main()\n\n\n# === hooks/pre-compact.py ===\n# Runs before Claude Code auto-summarizes a long conversation.\n# Captures session state so nothing is lost in compaction.\n\n\"\"\"\nPreCompact hook - captures conversation transcript before auto-compaction.\n\nWhen Claude Code's context window fills up, it auto-compacts (summarizes and\ndiscards detail). This hook fires BEFORE that happens, extracting conversation\ncontext and spawning flush.py to extract knowledge that would otherwise\nbe lost to summarization.\n\nThe hook itself does NO API calls - only local file I/O for speed (&lt;10s).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport logging\nimport os\nimport re\nimport subprocess\nimport sys\nfrom datetime import datetime, timezone\nfrom pathlib import Path\n\n# Recursion guard\nif os.environ.get(\"CLAUDE_INVOKED_BY\"):\n    sys.exit(0)\n\nROOT = Path(__file__).resolve().parent.parent\nSCRIPTS_DIR = ROOT / \"scripts\"\nSTATE_DIR = SCRIPTS_DIR\n\nlogging.basicConfig(\n    filename=str(SCRIPTS_DIR / \"flush.log\"),\n    level=logging.INFO,\n    format=\"%(asctime)s %(levelname)s [pre-compact] %(message)s\",\n    datefmt=\"%Y-%m-%d %H:%M:%S\",\n)\n\nMAX_TURNS = 30\nMAX_CONTEXT_CHARS = 15_000\nMIN_TURNS_TO_FLUSH = 5\n\n\ndef extract_conversation_context(transcript_path: Path) -&gt; tuple[str, int]:\n    \"\"\"Read JSONL transcript and extract last ~N conversation turns as markdown.\"\"\"\n    turns: list[str] = []\n\n    with open(transcript_path, encoding=\"utf-8\") as f:\n        for line in f:\n            line = line.strip()\n            if not line:\n                continue\n            try:\n                entry = json.loads(line)\n            except json.JSONDecodeError:\n                continue\n\n            msg = entry.get(\"message\", {})\n            if isinstance(msg, dict):\n                role = msg.get(\"role\", \"\")\n                content = msg.get(\"content\", \"\")\n            else:\n                role = entry.get(\"role\", \"\")\n                content = entry.get(\"content\", \"\")\n\n            if role not in (\"user\", \"assistant\"):\n                continue\n\n            if isinstance(content, list):\n                text_parts = []\n                for block in content:\n                    if isinstance(block, dict) and block.get(\"type\") == \"text\":\n                        text_parts.append(block.get(\"text\", \"\"))\n                    elif isinstance(block, str):\n                        text_parts.append(block)\n                content = \"\\n\".join(text_parts)\n\n            if isinstance(content, str) and content.strip():\n                label = \"User\" if role == \"user\" else \"Assistant\"\n                turns.append(f\"**{label}:** {content.strip()}\\n\")\n\n    recent = turns[-MAX_TURNS:]\n    context = \"\\n\".join(recent)\n\n    if len(context) &gt; MAX_CONTEXT_CHARS:\n        context = context[-MAX_CONTEXT_CHARS:]\n        boundary = context.find(\"\\n**\")\n        if boundary &gt; 0:\n            context = context[boundary + 1 :]\n\n    return context, len(recent)\n\n\ndef main() -&gt; None:\n    # Read hook input from stdin\n    try:\n        raw_input = sys.stdin.read()\n        try:\n            hook_input: dict = json.loads(raw_input)\n        except json.JSONDecodeError:\n            fixed_input = re.sub(r'(?&lt;!\\\\)\\\\(?![\"\\\\])', r'\\\\\\\\', raw_input)\n            hook_input = json.loads(fixed_input)\n    except (json.JSONDecodeError, ValueError, EOFError) as e:\n        logging.error(\"Failed to parse stdin: %s\", e)\n        return\n\n    session_id = hook_input.get(\"session_id\", \"unknown\")\n    transcript_path_str = hook_input.get(\"transcript_path\", \"\")\n\n    logging.info(\"PreCompact fired: session=%s\", session_id)\n\n    # transcript_path can be empty (known Claude Code bug #13668)\n    if not transcript_path_str or not isinstance(transcript_path_str, str):\n        logging.info(\"SKIP: no transcript path\")\n        return\n\n    transcript_path = Path(transcript_path_str)\n    if not transcript_path.exists():\n        logging.info(\"SKIP: transcript missing: %s\", transcript_path_str)\n        return\n\n    # Extract conversation context in the hook\n    try:\n        context, turn_count = extract_conversation_context(transcript_path)\n    except Exception as e:\n        logging.error(\"Context extraction failed: %s\", e)\n        return\n\n    if not context.strip():\n        logging.info(\"SKIP: empty context\")\n        return\n\n    if turn_count &lt; MIN_TURNS_TO_FLUSH:\n        logging.info(\"SKIP: only %d turns (min %d)\", turn_count, MIN_TURNS_TO_FLUSH)\n        return\n\n    # Write context to a temp file for the background process\n    timestamp = datetime.now(timezone.utc).astimezone().strftime(\"%Y%m%d-%H%M%S\")\n    context_file = STATE_DIR / f\"flush-context-{session_id}-{timestamp}.md\"\n    context_file.write_text(context, encoding=\"utf-8\")\n\n    # Spawn flush.py as a background process\n    flush_script = SCRIPTS_DIR / \"flush.py\"\n\n    cmd = [\n        \"uv\",\n        \"run\",\n        \"--directory\",\n        str(ROOT),\n        \"python\",\n        str(flush_script),\n        str(context_file),\n        session_id,\n    ]\n\n    creation_flags = subprocess.CREATE_NO_WINDOW if sys.platform == \"win32\" else 0\n\n    try:\n        subprocess.Popen(\n            cmd,\n            stdout=subprocess.DEVNULL,\n            stderr=subprocess.DEVNULL,\n            creationflags=creation_flags,\n        )\n        logging.info(\"Spawned flush.py for session %s (%d turns, %d chars)\", session_id, turn_count, len(context))\n    except Exception as e:\n        logging.error(\"Failed to spawn flush.py: %s\", e)\n\n\nif __name__ == \"__main__\":\n    main()\n\n\n# === hooks/session-end.py ===\n# Runs at the end of every Claude Code session.\n# Flushes the session's insights into knowledge/daily/YYYY-MM-DD.md\n# and updates knowledge/index.md.\n\n\"\"\"\nSessionEnd hook - captures conversation transcript for memory extraction.\n\nWhen a Claude Code session ends, this hook reads the transcript path from\nstdin, extracts conversation context, and spawns flush.py as a background\nprocess to extract knowledge into the daily log.\n\nThe hook itself does NO API calls - only local file I/O for speed (&lt;10s).\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport logging\nimport os\nimport re\nimport subprocess\nimport sys\nfrom datetime import datetime, timezone\nfrom pathlib import Path\n\n# Recursion guard: if we were spawned by flush.py (which calls Agent SDK,\n# which runs Claude Code, which would fire this hook again), exit immediately.\nif os.environ.get(\"CLAUDE_INVOKED_BY\"):\n    sys.exit(0)\n\nROOT = Path(__file__).resolve().parent.parent\nDAILY_DIR = ROOT / \"daily\"\nSCRIPTS_DIR = ROOT / \"scripts\"\nSTATE_DIR = SCRIPTS_DIR\n\nlogging.basicConfig(\n    filename=str(SCRIPTS_DIR / \"flush.log\"),\n    level=logging.INFO,\n    format=\"%(asctime)s %(levelname)s [hook] %(message)s\",\n    datefmt=\"%Y-%m-%d %H:%M:%S\",\n)\n\nMAX_TURNS = 30\nMAX_CONTEXT_CHARS = 15_000\nMIN_TURNS_TO_FLUSH = 1\n\n\ndef _summarize_tool_use(block: dict) -&gt; str | None:\n    \"\"\"Extract a short summary from a tool_use block.\"\"\"\n    name = block.get(\"name\", \"\")\n    inp = block.get(\"input\", {})\n    if not isinstance(inp, dict):\n        return None\n\n    # Skill invocations — capture the skill name\n    if name == \"Skill\":\n        skill = inp.get(\"skill\", \"unknown\")\n        return f\"[Skill: {skill}]\"\n\n    # Write — capture file path\n    if name == \"Write\":\n        fp = inp.get(\"file_path\", \"\")\n        if fp:\n            return f\"[Write: {Path(fp).name}]\"\n\n    # Edit — capture file path\n    if name == \"Edit\":\n        fp = inp.get(\"file_path\", \"\")\n        if fp:\n            return f\"[Edit: {Path(fp).name}]\"\n\n    # Agent — capture description\n    if name == \"Agent\":\n        desc = inp.get(\"description\", \"\")\n        if desc:\n            return f\"[Agent: {desc}]\"\n\n    return None\n\n\ndef extract_conversation_context(transcript_path: Path) -&gt; tuple[str, int]:\n    \"\"\"Read JSONL transcript and extract last ~N conversation turns as markdown.\"\"\"\n    # First pass: parse all entries\n    entries: list[dict] = []\n    with open(transcript_path, encoding=\"utf-8\") as f:\n        for line in f:\n            line = line.strip()\n            if not line:\n                continue\n            try:\n                entries.append(json.loads(line))\n            except json.JSONDecodeError:\n                continue\n\n    turns: list[str] = []\n\n    for entry in entries:\n        msg = entry.get(\"message\", {})\n        if isinstance(msg, dict):\n            role = msg.get(\"role\", \"\")\n            content = msg.get(\"content\", \"\")\n        else:\n            role = entry.get(\"role\", \"\")\n            content = entry.get(\"content\", \"\")\n\n        if role not in (\"user\", \"assistant\"):\n            continue\n\n        if isinstance(content, list):\n            text_parts = []\n            for block in content:\n                if isinstance(block, dict) and block.get(\"type\") == \"text\":\n                    text_parts.append(block.get(\"text\", \"\"))\n                elif isinstance(block, dict) and block.get(\"type\") == \"tool_use\":\n                    summary = _summarize_tool_use(block)\n                    if summary:\n                        text_parts.append(summary)\n                elif isinstance(block, str):\n                    text_parts.append(block)\n            content = \"\\n\".join(text_parts)\n\n        if isinstance(content, str) and content.strip():\n            label = \"User\" if role == \"user\" else \"Assistant\"\n            turns.append(f\"**{label}:** {content.strip()}\\n\")\n\n    recent = turns[-MAX_TURNS:]\n    context = \"\\n\".join(recent)\n\n    if len(context) &gt; MAX_CONTEXT_CHARS:\n        context = context[-MAX_CONTEXT_CHARS:]\n        boundary = context.find(\"\\n**\")\n        if boundary &gt; 0:\n            context = context[boundary + 1 :]\n\n    return context, len(recent)\n\n\ndef main() -&gt; None:\n    # Read hook input from stdin\n    # Claude Code on Windows may pass paths with unescaped backslashes\n    try:\n        raw_input = sys.stdin.read()\n        try:\n            hook_input: dict = json.loads(raw_input)\n        except json.JSONDecodeError:\n            fixed_input = re.sub(r'(?&lt;!\\\\)\\\\(?![\"\\\\])', r'\\\\\\\\', raw_input)\n            hook_input = json.loads(fixed_input)\n    except (json.JSONDecodeError, ValueError, EOFError) as e:\n        logging.error(\"Failed to parse stdin: %s\", e)\n        return\n\n    session_id = hook_input.get(\"session_id\", \"unknown\")\n    source = hook_input.get(\"source\", \"unknown\")\n    transcript_path_str = hook_input.get(\"transcript_path\", \"\")\n\n    logging.info(\"SessionEnd fired: session=%s source=%s\", session_id, source)\n\n    if not transcript_path_str or not isinstance(transcript_path_str, str):\n        logging.info(\"SKIP: no transcript path\")\n        return\n\n    transcript_path = Path(transcript_path_str)\n    if not transcript_path.exists():\n        logging.info(\"SKIP: transcript missing: %s\", transcript_path_str)\n        return\n\n    # Extract conversation context in the hook (fast, no API calls)\n    try:\n        context, turn_count = extract_conversation_context(transcript_path)\n    except Exception as e:\n        logging.error(\"Context extraction failed: %s\", e)\n        return\n\n    if not context.strip():\n        logging.info(\"SKIP: empty context\")\n        return\n\n    if turn_count &lt; MIN_TURNS_TO_FLUSH:\n        logging.info(\"SKIP: only %d turns (min %d)\", turn_count, MIN_TURNS_TO_FLUSH)\n        return\n\n    # Write context to a temp file for the background process\n    timestamp = datetime.now(timezone.utc).astimezone().strftime(\"%Y%m%d-%H%M%S\")\n    context_file = STATE_DIR / f\"session-flush-{session_id}-{timestamp}.md\"\n    context_file.write_text(context, encoding=\"utf-8\")\n\n    # Spawn flush.py as a background process\n    flush_script = SCRIPTS_DIR / \"flush.py\"\n\n    cmd = [\n        \"uv\",\n        \"run\",\n        \"--directory\",\n        str(ROOT),\n        \"python\",\n        str(flush_script),\n        str(context_file),\n        session_id,\n    ]\n\n    # On Windows, use CREATE_NO_WINDOW to avoid flash console window.\n    # Do NOT use DETACHED_PROCESS — it breaks the Agent SDK's subprocess I/O.\n    creation_flags = subprocess.CREATE_NO_WINDOW if sys.platform == \"win32\" else 0\n\n    try:\n        subprocess.Popen(\n            cmd,\n            stdout=subprocess.DEVNULL,\n            stderr=subprocess.DEVNULL,\n            creationflags=creation_flags,\n        )\n        logging.info(\"Spawned flush.py for session %s (%d turns, %d chars)\", session_id, turn_count, len(context))\n    except Exception as e:\n        logging.error(\"Failed to spawn flush.py: %s\", e)\n\n\nif __name__ == \"__main__\":\n    main()\n\n<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"tool-card\">\n      <h2>7 · Story template<\u002Fh2>\n      <p>Use this for every story. The negative-case AC has prevented more bugs than any test I've written.<\u002Fp>\n      <button class=\"copy-btn\" data-target=\"copy-story\">📋 Copy<\u002Fbutton>\n      <pre class=\"file-block\" id=\"copy-story\"># Story X.Y — [Title]\n\n**Epic:** [Epic name]\n**Status:** backlog\n**Depends on:** [list]\n\n## User Story\nAs a [role], I want [capability], so that [value].\n\n## Acceptance Criteria (numbered)\nAC1: [positive behavior — Given/When/Then]\nAC2: [...]\n...\nACN: [NEGATIVE — what NOT to touch]\nACN+1: [test target with bucket allocation: X unit · Y integration · Z e2e]\nACN+2: [performance budget — measurable, with corpus size]\n\n## Anti-Patterns from Prior Stories\n- [list anti-patterns to avoid · cite the prior story that taught it]\n\n## Phase F Manual Gate\n1. Run: [command]\n2. Verify: [observable state]\n3. Run: [command with --confirm]\n4. Verify: [observable post-state]\n\n## Multi-Agent Review Annotations (optional)\n- 🏗️ Architect: [touchpoint in pipeline]\n- 🧪 QA: [invariant test bucket sized]\n- 📊 Analyst: [corpus metric pre/post]\n- 🏃 SM: [risk + mitigation]\n- 🔬 DBA: [schema unchanged · AC reference]<\u002Fpre>\n    <\u002Fdiv>\n\n    <div class=\"tool-card\">\n      <h2>8 · Q&amp;A<\u002Fh2>\n      <p>Twelve questions to expect, with concrete answers. Generic — none require knowing the specific projects in the talk.<\u002Fp>\n\n      <details>\n        <summary>Q: This looks like a lot of overhead for small features. Is it worth it?<\u002Fsummary>\n        <p>It is, until it isn't. The discipline isn't about big features — it's about not paying the same lesson twice. A 1-hour retro that saves one re-debug pays for itself.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Concrete example:<\u002Fstrong> a shared-state bug that returned a default object by reference. Tests passed in isolation. Production rotted over hours. Without the retro habit, this same bug pattern would reappear in three different forms. With the retro habit, one rule (<em>\"never return module defaults by reference\"<\u002Fem>) catches it forever.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: What's the killer customization to start with?<\u002Fsummary>\n        <p><code>CLAUDE.md<\u002Fcode> with five rules and the SessionStart hook. Everything else can wait.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Suggested fi
