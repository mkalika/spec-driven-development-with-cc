rst five rules:<\u002Fstrong><\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li><code>\"Real-data smoke test before declaring done. Mocks don't count.\"<\u002Fcode><\u002Fli>\n          <li><code>\"Show me file:line for every claim. No theorizing.\"<\u002Fcode><\u002Fli>\n          <li><code>\"Minimal fix first. If you want to refactor more, ask.\"<\u002Fcode><\u002Fli>\n          <li><code>\"State expected value, state actual value, compare. No 'looks right.'\"<\u002Fcode><\u002Fli>\n          <li><code>\"Code comments are intentional. Don't 'fix' them without asking.\"<\u002Fcode><\u002Fli>\n        <\u002Ful>\n        <p style=\"margin-top: 8px;\">Those will pay for themselves in one week.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: How do you decide what becomes a CLAUDE.md rule vs. a knowledge concept?<\u002Fsummary>\n        <p>Rules are for things the AI must <em>check every time<\u002Fem>. Concepts are for things you might want to <em>look up after<\u002Fem> a similar incident. If you find yourself adding the same context manually in three sessions, it's a rule.<\u002Fp>\n        <p style=\"margin-top: 10px;\"><strong>CLAUDE.md rule examples<\u002Fstrong> (always-on, short, imperative):<\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li><code>\"Never mock external APIs in tests. Always run one live smoke test before declaring done.\"<\u002Fcode><\u002Fli>\n          <li><code>\"Strict TypeScript: no any, no @ts-ignore, no as any casts.\"<\u002Fcode><\u002Fli>\n          <li><code>\"Renderer never touches the filesystem directly — all I/O goes through the IPC layer.\"<\u002Fcode><\u002Fli>\n        <\u002Ful>\n        <p style=\"margin-top: 10px;\"><strong>Knowledge concept examples<\u002Fstrong> (referenceable, longer, contextual):<\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li><code>concepts/shared-state-bugs-in-module-defaults.md<\u002Fcode> — full incident write-up: how a default was returned by reference, the production rot it caused, the fix, related concepts.<\u002Fli>\n          <li><code>concepts/scale-broke-an-O(N²)-rule.md<\u002Fcode> — what the rule was, when it stopped working, what changed.<\u002Fli>\n          <li><code>concepts/three-layer-defense-explained.md<\u002Fcode> — the framework itself, with links to where each layer lives.<\u002Fli>\n        <\u002Ful>\n        <p style=\"margin-top: 10px;\"><strong>The deciding test:<\u002Fstrong> if the AI must <em>act differently<\u002Fem> because of it → rule. If you'd want to <em>look it up<\u002Fem> next time something similar happens → concept.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: Doesn't this slow you down?<\u002Fsummary>\n        <p>Counterintuitively, no — after the first project setup. The pattern compounds: rules accumulate, the system gets harder to fool, the same bugs stop reappearing.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Concrete pattern:<\u002Fstrong> first project takes ~2 hours to set up (CLAUDE.md, hooks, basic pipeline). The first epic is slower than usual because you're learning the cadence. By the 5th epic, velocity is higher than before — because every prior lesson is now automatic.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: What does this cost? Time and money.<\u002Fsummary>\n        <p><strong>Money:<\u002Fstrong> roughly $1–3 per active Claude Code session for typical API usage. Across five weeks of intense work, total spend in the low three figures.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Time:<\u002Fstrong><\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li>Setup: ~2 hours one-time (CLAUDE.md + hooks + folder structure)<\u002Fli>\n          <li>Per-retro: ~30 minutes<\u002Fli>\n          <li>Across 11 retros over 5 weeks: ~5.5 hours total<\u002Fli>\n        <\u002Ful>\n        <p style=\"margin-top: 8px;\">Compared against the cost of re-debugging the same class of bug five times, the math is one-sided.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: What happens when the model doesn't respect a rule?<\u002Fsummary>\n        <p>It happens. The fix is <em>structural enforcement<\u002Fem>, not stricter prose.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Concrete example:<\u002Fstrong> a rule that said \"never delete user data without confirmation\" was getting silently ignored — the AI would happily delete entries during a \"cleanup\" if asked. The fix wasn't to rephrase the rule. The fix was: make the cleanup script <em>refuse to run<\u002Fem> without a <code>--confirm<\u002Fcode> flag, and put the dry-run output behind a manual gate. Now the rule is enforced by the script, not by hope.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Pattern:<\u002Fstrong> if a rule keeps getting violated, make the system <em>physically incapable<\u002Fem> of violating it. Don't trust prose.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: How do you handle the noise from adversarial code review?<\u002Fsummary>\n        <p>Triage discipline. Applying a fix for a false positive can <em>introduce<\u002Fem> real bugs. The signal that survives includes catches no other gate finds.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Concrete example:<\u002Fstrong> an adversarial reviewer flagged a primary-key collision in a crash-recovery edge case — turned out to be a real bug that would have corrupted state on the second crash. No test would have caught it (you can't unit-test \"the process died here\"). Same review cycle also produced four false-positive flags about formatting. Patch ratio: ~1 real catch per 5 flags. You triage by checking the suspicious-sounding ones first, ignoring style-only flags entirely.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: We don't use BMAD or any specific agent framework. Does this work without it?<\u002Fsummary>\n        <p>Yes. The pattern is what matters, not the implementation.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>The pattern:<\u002Fstrong> spec → dev → review → manual gate, with rules accumulating in a project file. You can run this with any agent harness: Cursor, Aider, plain Claude Code, even a Slack bot. The shape is identical:<\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li>A spec the AI can be wrong against<\u002Fli>\n          <li>A review that checks the work adversarially<\u002Fli>\n          <li>A human gate before \"done\"<\u002Fli>\n          <li>A captured lesson if anything slipped<\u002Fli>\n        <\u002Ful>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: Does this scale to a team, or is it a solo workflow?<\u002Fsummary>\n        <p>It scales <em>better<\u002Fem> on a team — but the team has to share the artifacts.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>What scales:<\u002Fstrong> CLAUDE.md (checked into git, shared); the pipeline config (shared); the knowledge folder (shared); the retro habit (shared).<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>What doesn't scale automatically:<\u002Fstrong> the <em>discipline<\u002Fem>. If only half the team enforces the spec-first habit, the system rots from the loose end. The fix is: make the rules <em>structural<\u002Fem> — pipeline that won't proceed without a spec, CI that won't merge without manual gate sign-off.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>One-team rule:<\u002Fstrong> if a rule isn't in CLAUDE.md, it doesn't exist. Verbal agreement decays in a week.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: Does this only work with Claude Code, or is it model-agnostic?<\u002Fsummary>\n        <p>The <em>pattern<\u002Fem> is model-agnostic. The <em>tooling<\u002Fem> referenced here (CLAUDE.md, hooks, slash commands) is Claude Code-specific.<\u002Fp>\n        <p style=\"margin-top: 8px;\">For other agents:<\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li><strong>Cursor:<\u002Fstrong> use <code>.cursorrules<\u002Fcode> instead of CLAUDE.md. No native hooks, so you maintain the knowledge folder manually.<\u002Fli>\n          <li><strong>Aider:<\u002Fstrong> use <code>.aider.conf.yml<\u002Fcode> + a system prompt file. Hooks become git pre-commit hooks.<\u002Fli>\n          <li><strong>Cline / Continue:<\u002Fstrong> system prompt + rules file work similarly.<\u002Fli>\n          <li><strong>Plain LLM API:<\u002Fstrong> include the rules in every system prompt. No retro automation, but the discipline applies.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: How big does CLAUDE.md get before it becomes unwieldy?<\u002Fsummary>\n        <p>In practice, 50–80 rules across 5 categories is the sweet spot. Past 100 rules, the AI starts dropping context.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>How to keep it sized:<\u002Fstrong><\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li>Group rules by category (architecture · testing · AI integration · process)<\u002Fli>\n          <li>Promote rules to <em>structural enforcement<\u002Fem> whenever possible (a lint rule, a pre-commit hook, a CI check) and remove them from CLAUDE.md once enforced<\u002Fli>\n          <li>Demote stale rules to the knowledge folder if they no longer apply<\u002Fli>\n          <li>Audit every quarter: do all rules still earn their place?<\u002Fli>\n        <\u002Ful>\n        <p style=\"margin-top: 8px;\">CLAUDE.md is a living document. Rules graduate to code or retire to the archive. They don't sit there forever.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: What if the team doesn't buy in? Can one engineer do this alone?<\u002Fsummary>\n        <p>Yes. Start by yourself. Show the results. Adoption follows evidence.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>The solo playbook:<\u002Fstrong><\u002Fp>\n        <ul style=\"margin: 6px 0 0 18px; padding: 0;\">\n          <li>Week 1: add CLAUDE.md to your own project. Run one Claude Code session through it.<\u002Fli>\n          <li>Week 2: add the SessionStart hook. Notice the AI is \"smarter\" because it's loading your accumulated rules.<\u002Fli>\n          <li>Week 4: you've shipped fewer bugs than your peers. Someone will ask why.<\u002Fli>\n          <li>Week 6: show them this talk. Or the CLAUDE.md. Or the knowledge folder. Pick whichever resonates.<\u002Fli>\n        <\u002Ful>\n        <p style=\"margin-top: 8px;\">The team doesn't need to buy in. The team needs to <em>see it work<\u002Fem>.<\u002Fp>\n      <\u002Fdetails>\n\n      <details>\n        <summary>Q: What's the one-week challenge?<\u002Fsummary>\n        <p>Pick one Claude Code session this week. Before you start, write down what <em>\"done\"<\u002Fem> looks like — something the AI can be measurably wrong against.<\u002Fp>\n        <p style=\"margin-top: 8px;\">At the end, audit: did the AI get away with anything you didn't catch? If yes, write the rule that would have caught it. Put it in your <code>CLAUDE.md<\u002Fcode>.<\u002Fp>\n        <p style=\"margin-top: 8px;\"><strong>Start with one rule. Add the next one when the next bug teaches you.<\u002Fstrong><\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ============================================================\n     STATUS BAR\n     ============================================================ -->\n<footer class=\"statusbar\">\n  <span>Spec-Driven Development with Claude Code · Michael Kalika · Intuit · 2026<\u002Fspan>\n  <div class=\"keymap\">\n    <span><kbd>←<\u002Fkbd>/<kbd>→<\u002Fkbd> navigate<\u002Fspan>\n    <span><kbd>P<\u002Fkbd> present<\u002Fspan>\n    <span><kbd>O<\u002Fkbd> overview<\u002Fspan><span><kbd>T<\u002Fkbd> tools<\u002Fspan><span><kbd>F<\u002Fkbd> fullscreen<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- speaker note flyout -->\n<div class=\"scar-tooltip\" id=\"scar-tooltip\" hidden=\"\">\n  <div class=\"scar-label\">🧷 The scar behind this rule · presenter note<\u002Fdiv>\n  <div class=\"scar-rule\" id=\"scar-tooltip-title\"><\u002Fdiv>\n  <div id=\"scar-tooltip-content\"><\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<\u002Fdiv>\n\n<script>\n// ============================================================\n// APP — view switching, slide nav, speaker notes, copy buttons\n// ============================================================\n(function(){\n  const stage = document.getElementById('slide-stage');\n  const slides = Array.from(stage.querySelectorAll('.slide'));\n  let cur = 0;\n\n  const total = slides.length;\n  document.getElementById('tot').textContent = total;\n\n  function show(i, force) {\n    if (!force && (i < 0 || i >= total || i === cur)) return;\n    if (i < 0) i = 0;\n    if (i >= total) i = total - 1;\n    // Defensive: remove .active from ALL slides, not just slides[cur].\n    slides.forEach(s => s.classList.remove('active'));\n    cur = i;\n    slides[cur].classList.add('active');\n    document.getElementById('cur').textContent = cur + 1;\n    document.getElementById('slide-title').textContent = slides[cur].dataset.id || '';\n    document.getElementById('progress').textContent = (cur + 1) + ' / ' + total;\n    // scroll into view (in case of zoom)\n    slides[cur].scrollIntoView({block:'nearest', behavior:'smooth'});\n  }\n\n  document.getElementById('prev-btn').onclick = () => show(cur - 1);\n  document.getElementById('next-btn').onclick = () => show(cur + 1);\n\n  // VIEW SWITCHING\n  const views = {\n    present: document.getElementById('view-present'),\n    overview: document.getElementById('view-overview'),\n    tools: document.getElementById('view-tools')\n  };\n  const navButtons = document.querySelectorAll('header.topbar nav button[data-view]');\n  function setView(name) {\n    Object.entries(views).forEach(([k, el]) => { el.hidden = k !== name; });\n    navButtons.forEach(b => b.classList.toggle('active', b.dataset.view === name));\n  }\n  navButtons.forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));\n\n  // BUILD OVERVIEW THUMBS\n  const grid = document.getElementById('thumb-grid');\n  slides.forEach((s, idx) => {\n    const t = document.createElement('div');\n    t.className = 'thumb';\n    const h1 = s.querySelector('h1, h2');\n    const eb = s.querySelector('.eyebrow');\n    t.innerHTML = `\n      <div class=\"id\">SLIDE ${String(idx+1).padStart(2,'0')} · ${s.dataset.id || ''}<\u002Fdiv>\n      <div class=\"title\">${h1 ? h1.textContent.replace(/\\s+/g,' ').trim().slice(0, 80) : s.dataset.id}<\u002Fdiv>\n      <div class=\"desc\">${eb ? eb.textContent.trim() : ''}<\u002Fdiv>\n    `;\n    t.addEventListener('click', () => {\n      setView('present');\n      show(idx, true);\n    });\n    grid.appendChild(t);\n  });\n\n  // KEYBOARD NAV\n  document.addEventListener('keydown', (e) => {\n    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;\n    if (e.metaKey || e.ctrlKey || e.altKey) return;\n    switch (e.key) {\n      case 'ArrowRight': case ' ': case 'PageDown':\n        if (!views.present.hidden) { e.preventDefault(); show(cur + 1); }\n        break;\n      case 'ArrowLeft': case 'PageUp':\n        if (!views.present.hidden) { e.preventDefault(); show(cur - 1); }\n        break;\n      case 'Home':\n        if (!views.present.hidden) { e.preventDefault(); show(0, true); }\n        break;\n      case 'End':\n        if (!views.present.hidden) { e.preventDefault(); show(total - 1, true); }\n        break;\n      case 'p': case 'P': setView('present'); break;\n      case 'o': case 'O': setView('overview'); break;\n      case 't': case 'T': setView('tools'); break;\n      case 'f': case 'F':\n        if (!document.fullscreenElement) document.documentElement.requestFullscreen();\n        else document.exitFullscreen();\n        break;\n    }\n  });\n\n  // COPY BUTTONS\n  document.querySelectorAll('.copy-btn').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const target = document.getElementById(btn.dataset.target);\n      if (!target) return;\n      navigator.clipboard.writeText(target.textContent).then(() => {\n        const original = btn.textContent;\n        btn.textContent = '✓ Copied!';\n        btn.classList.add('copied');\n        setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1600);\n      });\n    });\n  });\n\n  // SCAR / TACTIC TOOLTIPS · one floating card, two source surfaces\n  // (.rule[data-scar] on the cheat-sheet slide, .card[data-tactic] on the failure-modes slide)\n  const tooltip = document.getElementById('scar-tooltip');\n  const tooltipLabel = tooltip.querySelector('.scar-label');\n  const tooltipTitle = document.getElementById('scar-tooltip-title');\n  const tooltipContent = document.getElementById('scar-tooltip-content');\n  const TOOLTIP_SELECTOR = '.rule[data-scar], .card[data-tactic]';\n  const SCAR_LABEL = '🧷 The scar behind this rule · presenter note';\n  const TACTIC_LABEL = '🛠 Counter-tactic · how to disarm this trap';\n  let hideTimer = null;\n  const GAP = 16, MARGIN = 16;\n\n  function positionTooltip(rule) {\n    const r = rule.getBoundingClientRect();\n    const vw = window.innerWidth, vh = window.innerHeight;\n    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;\n\n    // Prefer the side with more room. Left-column rules → right; right-column → left.\n    const spaceRight = vw - r.right - GAP - MARGIN;\n    const spaceLeft  = r.left - GAP - MARGIN;\n    const side = spaceRight >= tw ? 'right'\n              : spaceLeft  >= tw ? 'left'\n              : (spaceRight >= spaceLeft ? 'right' : 'left');\n\n    const left = side === 'right' ? r.right + GAP : r.left - GAP - tw;\n    let top = r.top + r.height / 2 - th / 2;\n    top = Math.max(MARGIN, Math.min(top, vh - th - MARGIN));\n\n    // arrow lines up with the rule's vertical center\n    const arrowTop = Math.max(12, Math.min(th - 24, (r.top + r.height / 2) - top - 7));\n\n    tooltip.style.left = Math.round(left) + 'px';\n    tooltip.style.top = Math.round(top) + 'px';\n    tooltip.style.setProperty('--arrow-top', arrowTop + 'px');\n    tooltip.dataset.side = side;\n  }\n\n  document.addEventListener('mouseover', (e) => {\n    const target = e.target.closest(TOOLTIP_SELECTOR);\n    if (target) {\n      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }\n      const isCard = target.matches('.card[data-tactic]');\n      const num = isCard ? '' : (target.querySelector('.num')?.textContent || '');\n      const text = isCard\n        ? (target.querySelector('h3')?.textContent || '')\n        : (target.querySelector('.text')?.textContent || '');\n      tooltipLabel.textContent = isCard ? TACTIC_LABEL : SCAR_LABEL;\n      tooltipTitle.innerHTML = (num ? '<span class=\"num\">' + num + '<\u002Fspan>' : '') + text;\n      tooltipContent.innerHTML = isCard ? target.dataset.tactic : target.dataset.scar;\n      tooltip.hidden = false;\n      // measure after content swap, then place\n      requestAnimationFrame(() => {\n        positionTooltip(target);\n        tooltip.classList.add('visible');\n      });\n    }\n  });\n  document.addEventListener('mouseout', (e) => {\n    const target = e.target.closest(TOOLTIP_SELECTOR);\n    if (target && !e.relatedTarget?.closest(TOOLTIP_SELECTOR)) {\n      tooltip.classList.remove('visible');\n      hideTimer = setTimeout(() => { tooltip.hidden = true; }, 200);\n    }\n  });\n\n  // MOBILE — slide 4 cards: always-open inline reveal (no tap); slide 18 rules: tap-to-expand\n  function buildMobileReveal() {\n    document.querySelectorAll('.card[data-tactic]').forEach(el => {\n      if (el.querySelector('.mobile-reveal')) return;\n      const reveal = document.createElement('div');\n      reveal.className = 'mobile-reveal';\n      reveal.innerHTML = '<div class=\"mobile-reveal__label\">🛠 Counter-tactic<\u002Fdiv>' + el.dataset.tactic;\n      el.appendChild(reveal);\n      // no chevron — always open\n    });\n    document.querySelectorAll('.rule[data-scar]').forEach(el => {\n      if (el.querySelector('.mobile-reveal')) return;\n      const reveal = document.createElement('div');\n      reveal.className = 'mobile-reveal';\n      reveal.innerHTML = '<div class=\"mobile-reveal__label\">🧩 The scar behind this rule<\u002Fdiv>' + el.dataset.scar;\n      el.appendChild(reveal);\n      const chev = document.createElement('div');\n      chev.className = 'mobile-chev';\n      chev.innerHTML = '<span class=\"chev-label\">Tap for the scar<\u002Fspan>';\n      el.appendChild(chev);\n    });\n  }\n  buildMobileReveal();\n\n  // toggle only on .rule[data-scar] (slide 18) — mobile widths only\n  const mobileMq = window.matchMedia('(max-width: 768px)');\n  document.addEventListener('click', (e) => {\n    if (!mobileMq.matches) return;\n    const target = e.target.closest('.rule[data-scar]');\n    if (!target) return;\n    if (e.target.closest('a, button')) return;\n    target.classList.toggle('expanded');\n  });\n  // collapse all on resize back to desktop\n  mobileMq.addEventListener('change', (ev) => {\n    if (!ev.matches) {\n      document.querySelectorAll('.expanded').forEach(el => el.classList.remove('expanded'));\n    }\n  });\n\n  // INIT\n  setView('present');\n  show(0, true);\n\n  // expose for debugging\n  window.__deck = { show, setView, total };\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
